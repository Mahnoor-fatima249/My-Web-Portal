<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Contact Page Specific styling */
        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .contact-container {
            width: 100%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .contact-heading {
            text-align: center;
            font-size: 2.2em;
            background: linear-gradient(45deg, #00ffff, #ff00cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .contact-intro { text-align: center; color: #ccc; margin-bottom: 30px; }

        .contact-info {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .contact-info-item { margin: 8px 0; font-size: 0.9em; }
        .contact-info-item strong { color: #00ffff; margin-right: 5px; }

        .form-input-group input, 
        .form-input-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            margin-bottom: 15px;
            outline: none;
        }

        .form-input-group textarea { height: 100px; resize: none; }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(255,0,204,0.4); }

        .contact-back { text-align: center; margin-top: 20px; }
        .contact-back a { color: #ccc; text-decoration: none; font-size: 0.85em; }
        .contact-back a:hover { color: white; }
    </style>
</head>
<body>

    <div class="contact-container">
        <h2 class="contact-heading">📞 Contact Us</h2>
        <p class="contact-intro">We'd love to hear from you!</p>

        <div class="contact-info">
            <div class="contact-info-item"><strong>✉︎ Email:</strong> mf0488789@gmail.com</div>
            <div class="contact-info-item"><strong>📱 Phone:</strong> +92 309 7204148</div>
            <div class="contact-info-item"><strong>📍 Address:</strong> Arfabad, Mandi Bahauddin</div>
        </div>

        <div class="contact-form-section">
            <div class="form-input-group">
                <input type="text" placeholder="Your Name" required>
            </div>
            <div class="form-input-group">
                <input type="email" placeholder="Your Email" required>
            </div>
            <div class="form-input-group">
                <textarea placeholder="Your Message" required></textarea>
            </div>
            <button type="submit">Send Message</button>
        </div>

        <div class="contact-back">
            <a href="Dashboard.html">← Back to Dashboard</a>
        </div>
    </div>

    <script>
        document.querySelector('button').addEventListener('click', (e) => {
            const inputs = document.querySelectorAll('input, textarea');
            let filled = true;
            inputs.forEach(input => { if(!input.value) filled = false; });
            
            if(filled) {
                alert('Thank you, Mahnoor! Your message has been sent.');
            } else {
                alert('Please fill all fields.');
            }
        });
    </script>

</body>
</html>
