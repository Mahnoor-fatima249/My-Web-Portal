<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .settings-container {
            position: absolute;
            width: 480px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            max-height: 85vh;
            overflow-y: auto;
            z-index: 10;
        }

        .settings-container::-webkit-scrollbar { width: 5px; }
        .settings-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .settings-header { text-align: center; margin-bottom: 20px; }
        .settings-header p { font-size: 0.8em; color: #aaa; }
        .settings-title {
            font-size: 2em;
            background: linear-gradient(45deg, #ff00cc, #3333ff, #ffcc00);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .settings-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 1.1em;
            color: #00ffff;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        .setting-items {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .setting-label { color: #ccc; font-size: 0.9em; }

        .toggle-switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: 0.4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: 0.4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00ff66; }
        input:checked + .slider:before { transform: translateX(20px); }

        .theme-select {
            padding: 5px 10px;
            border-radius: 5px;
            background: #222;
            color: white;
            border: 1px solid #444;
        }

        .setting-actions { display: flex; gap: 10px; margin-top: 20px; }
        .action-btn { flex: 1; padding: 12px; border-radius: 25px; text-decoration: none; font-size: 0.9em; text-align: center; transition: 0.3s; }
        .save-btn { background: linear-gradient(45deg, #ff00cc, #3333ff); color: white; font-weight: bold; }
        .back-btn { border: 1px solid white; color: white; }
    </style>
</head>
<body class="auth-body">

    <div class="ring">
        <i></i>
        <i></i>
        <i></i>

        <div class="settings-container">
            <div class="settings-header">
                <h1 class="settings-title">Settings</h1>
                <p>Manage your portal preferences</p>
            </div>

            <div class="settings-section">
                <h3 class="section-title">Appearance</h3>
                <div class="setting-items">
                    <span class="setting-label">Theme</span>
                    <select class="theme-select" title="Theme selector">
                        <option>Dark Mode</option>
                        <option>Light Mode</option>
                    </select>
                </div>
            </div>

            <div class="settings-section">
                <h3 class="section-title">Notifications</h3>
                <div class="setting-items">
                    <span class="setting-label">Email Alerts</span>
                    <label class="toggle-switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="setting-actions">
                <a href="Dashboard.html" class="action-btn back-btn">Dashboard</a>
                <a href="#" class="action-btn save-btn">Save Changes</a>
            </div>
        </div>
    </div>

</body>
</html>
