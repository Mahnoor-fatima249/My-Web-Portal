<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="ring">
        <i></i>
        <i></i>
        <i></i>

        <div class="login-box">
            <h2>Signup</h2>
            <form>
                <div class="inputbox"><input type="text" placeholder="Full Name" required></div>
                <div class="inputbox"><input type="text" placeholder="Username" required></div>
                <div class="inputbox"><input type="email" placeholder="Email" required></div>
                <div class="inputbox"><input type="password" placeholder="Password" required></div>
                <div class="inputbox"><input type="password" placeholder="Confirm Password" required></div>
                <a href="Dashboard.html" class="submit-btn">Create Account</a>
            </form>
            <div class="links">
                <br><a href="index.html" class="signup-link">Already have an account? Sign in</a>
            </div>
        </div>
    </div>

</body>
</html>
