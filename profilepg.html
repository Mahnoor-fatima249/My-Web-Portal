<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Sirf profile specific styles yahan rehne dein */
        .profile-container {
            position: absolute; /* Rings ke upar lane ke liye */
            width: 450px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
        }
        .profile-header { text-align: center; margin-bottom: 20px; }
        .profile-title {
            font-size: 2.2em;
            background: linear-gradient(45deg, #ff00cc, #3333ff, #ffcc00);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff00cc, #00ccff);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            border: 3px solid rgba(255,255,255,0.3);
        }
        .user-info {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .info-label { color: #aaa; font-size: 0.9em; }
        .profile-actions { display: flex; gap: 10px; margin-top: 20px; }
        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.9em;
            text-align: center;
            transition: 0.3s;
        }
        .edit-btn { background: white; color: black; font-weight: bold; }
        .back-btn { border: 1px solid white; color: white; }
        .action-btn:hover { transform: translateY(-3px); opacity: 0.9; }
    </style>
</head>
<body class="auth-body"> <div class="ring">
        <i></i>
        <i></i>
        <i></i>

        <div class="profile-container">
            <div class="profile-header">
                <div class="avatar">M</div>
                <h1 class="profile-title">My Profile</h1>
            </div>

            <div class="user-info">
                <div class="info-item">
                    <span class="info-label">Full Name:</span>
                    <span class="info-value">Mahnoor Fatima</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Status:</span>
                    <span class="info-value">IT Student</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Email:</span>
                    <span class="info-value">mf0488789@gmail.com</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Location:</span>
                    <span class="info-value">Pakistan</span>
                </div>
            </div>

            <div class="profile-actions">
                <a href="edit-profile.html" class="action-btn edit-btn">Edit Profile</a>
                <a href="Dashboard.html" class="action-btn back-btn">Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
